name: Data Issue
description: Report incorrect, missing, or outdated data for a model
title: "[Data] "
labels: ["data", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Data comes from the [Artificial Analysis](https://artificialanalysis.ai) API. If the data is wrong on their end, it will be wrong here too.
        Use this template for display issues or missing data on the Nxt AI Card side.

  - type: input
    id: model
    attributes:
      label: Affected model
      description: Exact model name as shown on the site
      placeholder: "e.g. GPT-4o, Claude 3.5 Sonnet, Gemini 2.0 Flash..."
    validations:
      required: true

  - type: dropdown
    id: data_type
    attributes:
      label: Type of data
      options:
        - Benchmark / Score
        - Parameter count (total / active)
        - Context window
        - Pricing (input / output)
        - Speed (tokens/s, TTFT)
        - Modalities (input / output)
        - Open weights
        - Reasoning model
        - Release date
        - Other
    validations:
      required: true

  - type: textarea
    id: current_value
    attributes:
      label: Currently displayed value
      placeholder: "e.g. 32B parameters"
    validations:
      required: true

  - type: textarea
    id: expected_value
    attributes:
      label: Expected correct value
      placeholder: "e.g. 70B parameters"
    validations:
      required: true

  - type: input
    id: source
    attributes:
      label: Reference source
      description: Link to official documentation or the source of the correction
      placeholder: "https://..."
