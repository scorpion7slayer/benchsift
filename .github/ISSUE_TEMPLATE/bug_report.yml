name: Bug Report
description: Report a problem or unexpected behavior
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this bug. Fill in the fields below to help us reproduce and fix it quickly.

  - type: dropdown
    id: page
    attributes:
      label: Affected page
      description: Where did you encounter the issue?
      options:
        - Homepage (model list)
        - Model detail page
        - Comparison page
        - Header / Navigation
        - Footer
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: Clearly describe what is happening.
      placeholder: "Example: when I click 'Compare', the page stays blank..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps to reproduce the bug.
      placeholder: |
        1. Go to the homepage
        2. Select 2 models
        3. Click "Compare"
        4. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happens?
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Other
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g. macOS 14, Windows 11, Ubuntu 22..."

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / logs
      description: Add screenshots or console error messages if available.
