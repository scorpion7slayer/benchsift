name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea to improve Nxt AI Card? Great! Describe it below.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the app does this relate to?
      options:
        - Model list
        - Model comparison
        - Model detail page
        - Filters / Sorting
        - Internationalization (FR/EN)
        - Performance
        - UI / Design
        - Data / Benchmarks
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or gap
      description: What problem would this feature solve?
      placeholder: "Currently, it's not possible to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature you'd like to see added.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Are there other ways to solve this problem?

  - type: dropdown
    id: priority
    attributes:
      label: Estimated priority
      options:
        - Critical (blocks usage)
        - High (significant improvement)
        - Medium (nice to have)
        - Low (cosmetic)
    validations:
      required: false
